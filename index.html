<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>EduIntellect — Teacher Dashboard</title>
    <meta name="description" content="AI-powered teacher dashboard for managing students, classes, attendance, grades, and communication." />
    <meta name="author" content="EduIntellect" />

    <!-- PWA meta tags -->
    <meta name="theme-color" content="#1e3272" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EduIntellect" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="EduIntellect" />
    <meta name="msapplication-TileColor" content="#1e3272" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta name="format-detection" content="telephone=no" />

    <!-- PWA manifest + icons -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <!-- OG / Twitter -->
    <meta property="og:title" content="EduIntellect — Teacher Dashboard" />
    <meta property="og:description" content="AI-powered teacher dashboard for managing students, classes, attendance, grades, and communication." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
