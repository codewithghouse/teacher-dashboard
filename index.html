    <!-- Typography: SF Pro Display / SF Pro Text via system stack — no remote fonts. -->

    <!-- ── Native-app CSS (inline = zero layout shift) ─────────
         Prevents pull-to-refresh, white flash on iOS PWA cold-start,
         tap highlight flash, callout menus.                     -->
    <style>
      html {
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        background: #1e3272;
      }
      body {
        overscroll-behavior: none;
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        background: #1e3272;
        margin: 0;
      }
      /* Hold theme color while JS bundle loads — no white flash */
      #root:empty::before {
        content: '';
        position: fixed;
        inset: 0;
        background: #1e3272;
        z-index: 9999;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // ── Block ALL zoom gestures (pinch, double-tap, Ctrl+wheel) ──
      // 1. Pinch-to-zoom on touch devices
      document.addEventListener("touchstart", function(e) {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });

      document.addEventListener("touchmove", function(e) {
        if (e.touches.length > 1) e.preventDefault();
      }, { passive: false });

      // 2. Double-tap zoom on iOS/Android
      var lastTouchEnd = 0;
      document.addEventListener("touchend", function(e) {
        var now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
      }, { passive: false });

      // 3. Ctrl+scroll / Ctrl+plus/minus on desktop
      document.addEventListener("wheel", function(e) {
        if (e.ctrlKey) e.preventDefault();
      }, { passive: false });

      document.addEventListener("keydown", function(e) {
        if ((e.ctrlKey || e.metaKey) && (e.key === "+" || e.key === "-" || e.key === "=" || e.key === "0")) {
          e.preventDefault();
        }
      });

      // 4. gesturestart/gesturechange (Safari-specific)
      document.addEventListener("gesturestart", function(e) { e.preventDefault(); });
      document.addEventListener("gesturechange", function(e) { e.preventDefault(); });
    </script>
  </body>
</html>
